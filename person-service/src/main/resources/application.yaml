spring:
  application:
    name: person-service
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
  #activar colores para el log
  output:
    ansi:
      enabled: ALWAYS

#config de log y crear archivo
logging:
  file:
    name: logs/person-service.log
  level:
    root: INFO
    com.condominio.persona: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

#url de reniec para ws
