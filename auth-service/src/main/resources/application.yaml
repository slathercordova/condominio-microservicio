spring:
  application:
    name: auth-service
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
  #activar colores para el log
  output:
    ansi:
      enabled: ALWAYS
  #Config de envío de correos
  mail:
    host: smtp.gmail.com
    port: 587
    username: essi.lcordova@gmail.com
    password: hagp yxmg aecy qdpp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

#config de log y crear archivo
logging:
  file:
    name: logs/auth-service.log
  level:
    root: INFO
    com.condominio.auth: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

#config de security
jwt:
  expiration: 900000
  long-expiration: 604800000
  secret: mi_clave_super_secreta_12345678901234567890

#eureka
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

#circuit breaker
resilience4j:
  circuitbreaker:
    instances:
      edificioService:
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
  retry:
    instances:
      edificioService:
        maxAttempts: 3
        waitDuration: 2s

#actuator
management:
  endpoints:
    web:
      exposure:
        include: "*"

