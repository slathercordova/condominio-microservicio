spring:
  application:
    name: auth-service
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
  #activar colores para el log
  output:
    ansi:
      enabled: ALWAYS

#config de log y crear archivo
logging:
  file:
    name: logs/auth-service.log
  level:
    root: INFO
    com.condominio.auth: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE


# con las 3 lineas de abajo le decimos que levante el proyecto sin la necesidad de la cfg de bd
#  autoconfigure:
#    exclude:
#      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

#OJO, hay 2 archivos extra de configuración, uno para dev y el otro para el docker, se configura de la siguiente forma:
#Spring usa -> spring.profiles.active
#En Run Configuration -> Environment variables -> SPRING_PROFILES_ACTIVE=dev